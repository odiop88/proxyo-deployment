services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: proxyo_staging
      POSTGRES_USER: proxyo_staging_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - proxyo_staging_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped

  backend:
    build:
      context: ./proxyo-backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"

      ALLOWED_HOSTS: api-staging.proxyo.fr,localhost,127.0.0.1
      FRONTEND_URL: https://staging.proxyo.fr

      CORS_ALLOW_ALL_ORIGINS: "False"
      CORS_ALLOWED_ORIGINS: https://staging.proxyo.fr
      CSRF_TRUSTED_ORIGINS: https://staging.proxyo.fr,https://api-staging.proxyo.fr

      DB_NAME: proxyo_staging
      DB_USER: proxyo_staging_user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432

      REDIS_HOST: redis
      REDIS_PORT: 6379

      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}

      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

      NGROK_AUTHTOKEN: ""
    command: daphne -b 0.0.0.0 -p 8000 Proxyo_back.asgi:application
    volumes:
      - proxyo_staging_static:/app/staticfiles
      - proxyo_staging_media:/app/media
    depends_on:
      - db
      - redis
    expose:
      - "8000"

  frontend:
    build:
      context: ./proxyo-frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: https://api-staging.proxyo.fr/api
        VITE_WS_BASE_URL: wss://api-staging.proxyo.fr/ws
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
        VITE_APP_ENV: staging
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

volumes:
  proxyo_staging_postgres_data:
  proxyo_staging_media:
  proxyo_staging_static: